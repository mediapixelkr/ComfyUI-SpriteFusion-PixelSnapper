name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            source: target/release/spritefusion-pixel-snapper.exe
            asset: spritefusion-pixel-snapper-windows-x86_64.exe
          - os: ubuntu-latest
            source: target/release/spritefusion-pixel-snapper
            asset: spritefusion-pixel-snapper-linux-x86_64
          - os: macos-15-intel
            source: target/release/spritefusion-pixel-snapper
            asset: spritefusion-pixel-snapper-macos-x86_64
          - os: macos-15
            source: target/release/spritefusion-pixel-snapper
            asset: spritefusion-pixel-snapper-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Rename release asset
        shell: bash
        run: cp "${{ matrix.source }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
